<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profile | Mara Horizon Trust</title>
<link rel="stylesheet" href="css/styles.css">
<style>
  .dash-head{ padding:2.8rem 0 1.6rem; display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:1rem; }
  .dash-grid{ display:grid; grid-template-columns:1.3fr .9fr; gap:1.6rem; align-items:start; }
  @media (max-width:940px){ .dash-grid{ grid-template-columns:1fr; } }
  .panel{ background:var(--white); border:1px solid var(--line); border-radius:var(--radius-m); padding:1.6rem; margin-bottom:1.6rem; }
  .panel h3{ font-size:1.1rem; margin-bottom:1.1rem; }
  .note-item{ padding:.8rem 0; border-bottom:1px solid var(--line-soft); font-size:.86rem; }
  .note-item:last-child{ border-bottom:none; }
  .note-item .when{ color:var(--slate-soft); font-family:'JetBrains Mono',monospace; font-size:.68rem; display:block; margin-top:.25rem; }
  .note-item.unread{ position:relative; padding-left:1rem; }
  .note-item.unread::before{ content:""; position:absolute; left:0; top:1rem; width:6px; height:6px; border-radius:50%; background:var(--amber); }
</style>
</head>
<body>

<header class="site">
  <div class="wrap nav-row">
    <div class="brand">
      <svg class="brand-mark" viewBox="0 0 40 40" aria-hidden="true">
        <circle cx="20" cy="20" r="19" fill="#1F3B2C"/>
        <circle cx="20" cy="17" r="7" fill="#D98F2B"/>
        <path d="M1 25 Q10 19 20 25 T39 25 V39 H1 Z" fill="#12241A"/>
      </svg>
      <div class="brand-text"><strong>Mara Horizon Trust</strong><span>Conservation Careers</span></div>
    </div>
    <button class="nav-toggle" id="navToggle" aria-label="Toggle menu">☰</button>
    <nav class="main-nav" id="mainNav">
      <a href="index.html">Home</a>
      <a href="jobs.html">Vacancies</a>
      <a href="employer.html">Employers</a>
      <a href="admin.html">Admin</a>
      <span id="navAuthSlot"></span>
    </nav>
  </div>
</header>

<div id="pageContent" class="wrap"></div>

<footer class="site">
  <div class="wrap foot-bottom">
    <span>© 2026 Mara Horizon Trust. All rights reserved.</span>
    <span>Registry system MHT-2026</span>
  </div>
</footer>

<script src="js/app.js"></script>
<script>
function render(){
  const host = document.getElementById('pageContent');
  const user = MHT.auth.currentUser();

  if(!user || user.role !== 'applicant'){
    host.innerHTML = `
      <div class="gate">
        <p class="eyebrow" style="justify-content:center;">Applicant Access</p>
        <h2 class="text-center" style="margin:.6rem 0 1.6rem;">Sign in to manage your profile</h2>
        <div class="tabbar">
          <button type="button" class="active" data-tab="login">Sign in</button>
          <button type="button" data-tab="register">Create profile</button>
        </div>
        <form id="loginForm">
          <div class="field"><label>Email</label><input type="email" id="loginEmail" required></div>
          <div class="field"><label>Password</label><input type="password" id="loginPassword" required></div>
          <button class="btn btn-primary btn-block" type="submit">Sign in</button>
        </form>
        <form id="registerForm" style="display:none;">
          <div class="field"><label>Full name</label><input type="text" id="regName" required></div>
          <div class="field"><label>Email</label><input type="email" id="regEmail" required></div>
          <div class="field"><label>Phone</label><input type="tel" id="regPhone" required></div>
          <div class="field"><label>Password</label><input type="password" id="regPassword" required></div>
          <button class="btn btn-primary btn-block" type="submit">Create profile</button>
        </form>
      </div>`;
    wireGate();
    return;
  }

  const profile = MHT.profiles.get(user.id) || {};
  const apps = MHT.applications.byUser(user.id);
  const notes = MHT.notifications.forUser(user.id);
  MHT.notifications.markAllRead(user.id);

  host.innerHTML = `
    <div class="dash-head">
      <div>
        <p class="eyebrow">Applicant Dashboard</p>
        <h1 style="font-size:clamp(1.6rem,3vw,2.2rem); margin-top:.5rem;">Welcome back, ${user.name.split(' ')[0]}.</h1>
      </div>
      <button class="btn btn-ghost btn-sm" id="logoutBtn">Sign out</button>
    </div>

    <div class="dash-grid">
      <div>
        <div class="panel">
          <h3>My profile</h3>
          <form id="profileForm">
            <div class="form-grid">
              <div class="field"><label>Full name</label><input type="text" id="pfName" value="${user.name}" required></div>
              <div class="field"><label>Email</label><input type="email" id="pfEmail" value="${user.email}" disabled></div>
              <div class="field"><label>Phone</label><input type="tel" id="pfPhone" value="${user.phone||''}" required></div>
              <div class="field"><label>Location</label><input type="text" id="pfLocation" value="${profile.location||''}" placeholder="City, Country"></div>
            </div>
            <div class="field"><label>Summary / bio</label><textarea id="pfBio" placeholder="A short note on your background and career interests…">${profile.bio||''}</textarea></div>
            <button class="btn btn-primary" type="submit">Save profile</button>
          </form>
        </div>

        <div class="panel">
          <h3>Master documents</h3>
          <p class="small muted" style="margin-top:-.6rem; margin-bottom:1rem;">Keep these on file so you can re-use them across applications.</p>
          <div class="form-grid">
            <div class="field"><label>CV / Resume</label><label class="file-drop ${profile.masterCv?'filled':''}" for="mCv"><span>${profile.masterCv ? profile.masterCv.name : 'Choose file…'}</span><span>📎</span><input type="file" id="mCv"></label></div>
            <div class="field"><label>National ID / Passport</label><label class="file-drop ${profile.masterId?'filled':''}" for="mId"><span>${profile.masterId ? profile.masterId.name : 'Choose file…'}</span><span>📎</span><input type="file" id="mId"></label></div>
            <div class="field"><label>Passport photo</label><label class="file-drop ${profile.masterPhoto?'filled':''}" for="mPhoto"><span>${profile.masterPhoto ? profile.masterPhoto.name : 'Choose file…'}</span><span>📎</span><input type="file" id="mPhoto"></label></div>
            <div class="field"><label>Driving licence</label><label class="file-drop ${profile.masterLicence?'filled':''}" for="mLicence"><span>${profile.masterLicence ? profile.masterLicence.name : 'Choose file…'}</span><span>📎</span><input type="file" id="mLicence"></label></div>
          </div>
          <button class="btn btn-ghost btn-sm" id="saveDocsBtn" type="button">Save documents</button>
        </div>

        <div class="panel">
          <h3>My applications (${apps.length})</h3>
          ${apps.length ? `
          <div class="table-wrap">
            <table>
              <thead><tr><th>Ref</th><th>Vacancy</th><th>Applied</th><th>Status</th></tr></thead>
              <tbody>
                ${apps.map(a => {
                  const job = MHT.jobs.byId(a.jobId);
                  return `<tr>
                    <td class="ref">${a.ref}</td>
                    <td>${job ? job.title : 'Vacancy removed'}</td>
                    <td>${MHT.formatDate(a.appliedAt.slice(0,10))}</td>
                    <td><span class="badge ${MHT.statusBadgeClass(a.status)}">${a.status}</span></td>
                  </tr>`;
                }).join('')}
              </tbody>
            </table>
          </div>` : `<div class="empty"><strong>No applications yet</strong>Browse open vacancies and apply to get started.<br><a class="btn btn-amber btn-sm" href="jobs.html" style="margin-top:1rem;">Browse Vacancies</a></div>`}
        </div>
      </div>

      <div>
        <div class="panel">
          <h3>Notifications</h3>
          ${notes.length ? notes.map(n => `<div class="note-item">${n.message}<span class="when">${MHT.timeAgo(n.date)}</span></div>`).join('') : `<p class="small muted">No notifications yet.</p>`}
        </div>
      </div>
    </div>
  `;

  document.getElementById('logoutBtn').addEventListener('click', () => { MHT.auth.logout(); MHT.paintAuthNav(); render(); });
  document.getElementById('profileForm').addEventListener('submit', e => {
    e.preventDefault();
    MHT.profiles.save(user.id, { location:document.getElementById('pfLocation').value, bio:document.getElementById('pfBio').value });
    const users = MHT.users.all().map(u => u.id===user.id ? { ...u, name:document.getElementById('pfName').value, phone:document.getElementById('pfPhone').value } : u);
    localStorage.setItem('mht_users', JSON.stringify(users));
    MHT.toast('Profile saved.', 'ok'); MHT.paintAuthNav(); render();
  });
  document.getElementById('saveDocsBtn').addEventListener('click', () => {
    const cv = document.getElementById('mCv').files[0];
    const idDoc = document.getElementById('mId').files[0];
    const photo = document.getElementById('mPhoto').files[0];
    const licence = document.getElementById('mLicence').files[0];
    const patch = {};
    if(cv) patch.masterCv = MHT.fileMeta(cv);
    if(idDoc) patch.masterId = MHT.fileMeta(idDoc);
    if(photo) patch.masterPhoto = MHT.fileMeta(photo);
    if(licence) patch.masterLicence = MHT.fileMeta(licence);
    MHT.profiles.save(user.id, patch);
    MHT.toast('Documents saved.', 'ok'); render();
  });
}

function wireGate(){
  const loginTab = document.querySelector('[data-tab="login"]');
  const regTab = document.querySelector('[data-tab="register"]');
  const loginForm = document.getElementById('loginForm');
  const regForm = document.getElementById('registerForm');
  loginTab.addEventListener('click', () => { loginTab.classList.add('active'); regTab.classList.remove('active'); loginForm.style.display='block'; regForm.style.display='none'; });
  regTab.addEventListener('click', () => { regTab.classList.add('active'); loginTab.classList.remove('active'); regForm.style.display='block'; loginForm.style.display='none'; });

  loginForm.addEventListener('submit', e => {
    e.preventDefault();
    const res = MHT.auth.login(document.getElementById('loginEmail').value, document.getElementById('loginPassword').value);
    if(res.error){ MHT.toast(res.error, 'err'); return; }
    if(res.user.role !== 'applicant'){ MHT.toast('This portal is for applicant accounts. Employers and admins have their own dashboards.', 'err'); MHT.auth.logout(); return; }
    MHT.toast('Signed in.', 'ok'); MHT.paintAuthNav(); render();
  });
  regForm.addEventListener('submit', e => {
    e.preventDefault();
    const res = MHT.auth.register({
      role:'applicant', name:document.getElementById('regName').value, email:document.getElementById('regEmail').value,
      phone:document.getElementById('regPhone').value, password:document.getElementById('regPassword').value
    });
    if(res.error){ MHT.toast(res.error, 'err'); return; }
    MHT.toast('Profile created.', 'ok'); MHT.paintAuthNav(); render();
  });
}

render();
</script>
</body>
</html>
