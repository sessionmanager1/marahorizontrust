<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mara Horizon Trust — Careers in Conservation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,500&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --white:#FFFFFF;
    --sand:#FBF5EE;
    --charcoal:#241A1A;
    --red:#A6182A;
    --red-deep:#6E0F1C;
    --red-bright:#D62839;
    --gold:#C7A15A;
    --line:rgba(36,26,26,0.12);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html{scroll-behavior:smooth;}
  body{
    background:var(--white);
    color:var(--charcoal);
    font-family:'Manrope',sans-serif;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.01ms !important; animation-iteration-count:1 !important; transition-duration:0.01ms !important; scroll-behavior:auto !important;}
  }
  h1,h2,h3{
    font-family:'Fraunces',serif;
    font-weight:600;
    letter-spacing:-0.01em;
    line-height:1.05;
  }
  .eyebrow{
    font-family:'JetBrains Mono',monospace;
    font-size:0.72rem;
    letter-spacing:0.16em;
    text-transform:uppercase;
    color:var(--red);
    display:flex;
    align-items:center;
    gap:0.6rem;
  }
  .eyebrow::before{
    content:"";
    width:22px;height:1px;background:var(--red);
    display:inline-block;
  }
  a{color:inherit;text-decoration:none;}
  img{max-width:100%;display:block;}
  .wrap{max-width:1180px;margin:0 auto;padding:0 28px;}

  /* ---------- NAV ---------- */
  header{
    position:sticky;top:0;z-index:50;
    background:rgba(255,255,255,0.86);
    backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);
  }
  nav{
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 28px;max-width:1180px;margin:0 auto;
  }
  .brand{display:flex;align-items:center;gap:12px;}
  .brand img{width:42px;height:42px;border-radius:50%;object-fit:cover;box-shadow:0 0 0 2px var(--white),0 0 0 3px var(--red);}
  .brand-name{font-family:'Fraunces',serif;font-weight:700;font-size:1.05rem;letter-spacing:-0.01em;}
  .brand-name span{color:var(--red);}
  .nav-links{display:flex;gap:32px;font-size:0.9rem;font-weight:600;}
  .nav-links a{opacity:0.75;transition:opacity .2s;}
  .nav-links a:hover{opacity:1;color:var(--red);}
  .nav-cta{
    background:var(--red);color:var(--white);
    padding:10px 20px;border-radius:100px;font-weight:700;font-size:0.86rem;
    transition:background .2s, transform .2s;
  }
  .nav-cta:hover{background:var(--red-deep);transform:translateY(-1px);}
  .burger{display:none;}

  /* ---------- HERO ---------- */
  .hero{
    position:relative;
    padding:88px 0 0;
    overflow:hidden;
  }
  .hero-grid{
    display:grid;grid-template-columns:1.15fr 0.85fr;gap:48px;
    align-items:center;
    max-width:1180px;margin:0 auto;padding:0 28px 64px;
  }
  .hero h1{
    font-size:clamp(2.4rem, 4.6vw, 4rem);
    margin:20px 0 22px;
  }
  .hero h1 em{
    font-style:italic;color:var(--red);
  }
  .hero p.lede{
    font-size:1.08rem;line-height:1.65;color:#4a3b3b;max-width:520px;margin-bottom:32px;
  }
  .hero-actions{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:38px;}
  .btn-primary{
    background:var(--red);color:var(--white);padding:15px 28px;border-radius:100px;
    font-weight:700;font-size:0.92rem;transition:background .2s, transform .2s;
    display:inline-flex;align-items:center;gap:8px;
  }
  .btn-primary:hover{background:var(--red-deep);transform:translateY(-2px);}
  .btn-ghost{
    border:1.5px solid var(--line);color:var(--charcoal);padding:15px 28px;border-radius:100px;
    font-weight:700;font-size:0.92rem;transition:border-color .2s, background .2s;
  }
  .btn-ghost:hover{border-color:var(--red);background:var(--sand);}
  .hero-stats{display:flex;gap:34px;padding-top:26px;border-top:1px solid var(--line);}
  .hero-stats div{display:flex;flex-direction:column;}
  .hero-stats b{font-family:'Fraunces',serif;font-size:1.7rem;color:var(--red);}
  .hero-stats span{font-size:0.78rem;color:#6b5959;font-weight:600;}

  .hero-visual{
    position:relative;
    border-radius:28px;
    overflow:hidden;
    background:linear-gradient(180deg,#fff 0%, var(--sand) 100%);
    border:1px solid var(--line);
    aspect-ratio:4/5;
    display:flex;align-items:center;justify-content:center;
    padding:40px;
  }
  .hero-visual img{
    width:78%;
    filter:drop-shadow(0 20px 40px rgba(166,24,42,0.18));
  }
  .hero-visual .ring{
    position:absolute;inset:18px;border:1px dashed rgba(166,24,42,0.35);border-radius:22px;
  }

  /* horizon signature divider */
  .horizon{
    position:relative;width:100%;height:140px;overflow:hidden;
  }
  .horizon svg{width:100%;height:100%;display:block;}
  .horizon-label{
    position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
    font-family:'JetBrains Mono',monospace;font-size:0.68rem;letter-spacing:0.22em;
    text-transform:uppercase;color:var(--white);opacity:0.85;text-align:center;
    white-space:nowrap;
  }

  /* ---------- SECTION GENERIC ---------- */
  section{padding:96px 0;}
  .section-head{max-width:640px;margin-bottom:56px;}
  .section-head h2{font-size:clamp(1.9rem,3vw,2.6rem);margin-top:16px;}
  .section-head p{color:#5c4b4b;margin-top:16px;line-height:1.6;font-size:1.02rem;}
  .alt{background:var(--sand);}

  /* ---------- WHO WE SERVE ---------- */
  .roles{
    display:grid;grid-template-columns:repeat(4,1fr);gap:1px;
    background:var(--line);border:1px solid var(--line);border-radius:18px;overflow:hidden;
  }
  .role{
    background:var(--white);padding:26px 20px;transition:background .25s;
    min-height:120px; display:flex; flex-direction:column; justify-content:flex-end;
  }
  .role:hover{background:var(--sand);}
  .role .n{font-family:'JetBrains Mono',monospace;font-size:0.7rem;color:var(--red);margin-bottom:8px;}
  .role .t{font-weight:700;font-size:0.94rem;}

  /* ---------- FEATURE CARDS ---------- */
  .feat-grid{
    display:grid;grid-template-columns:repeat(3,1fr);gap:2px;
    background:var(--line);border-radius:20px;overflow:hidden;border:1px solid var(--line);
  }
  .feat{
    background:var(--white);padding:34px 30px;
  }
  .feat .icon{
    width:44px;height:44px;border-radius:12px;background:var(--red);color:var(--white);
    display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;
    font-weight:700;font-size:1.1rem;margin-bottom:20px;
  }
  .feat h3{font-size:1.12rem;margin-bottom:10px;}
  .feat p{font-size:0.92rem;color:#5c4b4b;line-height:1.55;}

  /* ---------- HOW IT WORKS ---------- */
  .steps{display:grid;grid-template-columns:repeat(4,1fr);gap:0;position:relative;}
  .step{padding:0 24px 0 0;position:relative;}
  .step:not(:last-child)::after{
    content:"";position:absolute;top:20px;right:-2px;width:100%;height:1px;
    background:repeating-linear-gradient(90deg,var(--gold) 0 6px, transparent 6px 12px);
  }
  .step .idx{
    font-family:'Fraunces',serif;font-weight:700;font-size:1.6rem;color:var(--red);
    margin-bottom:14px;
  }
  .step h3{font-size:1.02rem;margin-bottom:8px;}
  .step p{font-size:0.88rem;color:#5c4b4b;line-height:1.5;}

  /* ---------- ADMIN / DASHBOARD PANEL ---------- */
  .panel-wrap{
    display:grid;grid-template-columns:0.9fr 1.1fr;gap:56px;align-items:center;
  }
  .panel-mock{
    background:var(--charcoal);border-radius:20px;padding:22px;
    box-shadow:0 30px 60px rgba(36,26,26,0.25);
  }
  .panel-mock .bar{display:flex;gap:6px;margin-bottom:18px;}
  .panel-mock .dot{width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,0.25);}
  .panel-mock .dot:first-child{background:var(--red-bright);}
  .panel-row{
    display:flex;justify-content:space-between;align-items:center;
    background:rgba(255,255,255,0.06);border-radius:10px;padding:14px 16px;margin-bottom:10px;
  }
  .panel-row .lbl{color:rgba(255,255,255,0.85);font-size:0.86rem;font-weight:600;}
  .panel-row .val{font-family:'JetBrains Mono',monospace;font-size:0.78rem;color:var(--gold);}
  .status{
    display:inline-block;padding:3px 10px;border-radius:100px;font-size:0.68rem;font-weight:700;
    font-family:'JetBrains Mono',monospace;
  }
  .status.ok{background:rgba(198,167,90,0.18);color:var(--gold);}
  .status.rev{background:rgba(214,40,57,0.2);color:#ff8a95;}
  .status.new{background:rgba(255,255,255,0.12);color:#fff;}

  .checklist{list-style:none;margin-top:6px;}
  .checklist li{
    display:flex;gap:14px;padding:16px 0;border-bottom:1px solid var(--line);
  }
  .checklist li:last-child{border-bottom:none;}
  .checklist .mark{
    width:22px;height:22px;border-radius:50%;border:1.5px solid var(--red);
    flex-shrink:0;display:flex;align-items:center;justify-content:center;
    font-size:0.7rem;color:var(--red);margin-top:2px;
  }
  .checklist b{display:block;font-size:0.98rem;margin-bottom:3px;}
  .checklist span{font-size:0.86rem;color:#5c4b4b;}

  /* ---------- CTA ---------- */
  .cta{
    background:linear-gradient(135deg,var(--red-deep), var(--red) 60%, var(--red-bright));
    border-radius:28px;
    padding:64px 48px;
    text-align:center;
    color:var(--white);
    position:relative;
    overflow:hidden;
  }
  .cta h2{color:var(--white);font-size:clamp(1.8rem,3.4vw,2.6rem);margin-bottom:16px;}
  .cta p{color:rgba(255,255,255,0.85);max-width:480px;margin:0 auto 32px;line-height:1.6;}
  .cta .btn-primary{background:var(--white);color:var(--red-deep);}
  .cta .btn-primary:hover{background:var(--sand);}
  .cta-actions{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;}
  .cta .btn-ghost{border-color:rgba(255,255,255,0.4);color:var(--white);}
  .cta .btn-ghost:hover{background:rgba(255,255,255,0.12);border-color:var(--white);}

  /* ---------- FOOTER ---------- */
  footer{background:var(--charcoal);color:rgba(255,255,255,0.7);padding:64px 0 28px;}
  .foot-grid{display:grid;grid-template-columns:1.4fr 1fr 1fr 1fr;gap:40px;margin-bottom:48px;}
  .foot-brand{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
  .foot-brand img{width:38px;height:38px;border-radius:50%;}
  .foot-brand b{font-family:'Fraunces',serif;color:var(--white);font-size:1rem;}
  footer p.tag{font-size:0.88rem;line-height:1.6;max-width:280px;}
  footer h4{color:var(--white);font-size:0.82rem;letter-spacing:0.06em;text-transform:uppercase;margin-bottom:16px;font-family:'JetBrains Mono',monospace;font-weight:500;}
  footer ul{list-style:none;}
  footer li{margin-bottom:11px;font-size:0.9rem;}
  footer a:hover{color:var(--red-bright);}
  .foot-bottom{
    border-top:1px solid rgba(255,255,255,0.1);padding-top:24px;
    display:flex;justify-content:space-between;font-size:0.8rem;color:rgba(255,255,255,0.45);
    flex-wrap:wrap;gap:10px;
  }

  /* ---------- RESPONSIVE ---------- */
  @media (max-width:920px){
    .nav-links{display:none;}
    .hero-grid{grid-template-columns:1fr;}
    .hero-visual{max-width:420px;margin:0 auto;}
    .roles{grid-template-columns:repeat(2,1fr);}
    .feat-grid{grid-template-columns:1fr;}
    .steps{grid-template-columns:1fr 1fr;gap:32px 24px;}
    .step:not(:last-child)::after{display:none;}
    .panel-wrap{grid-template-columns:1fr;gap:36px;}
    .foot-grid{grid-template-columns:1fr 1fr;}
  }
  @media (max-width:560px){
    .roles{grid-template-columns:1fr 1fr;}
    .steps{grid-template-columns:1fr;}
    .hero-stats{flex-wrap:wrap;gap:24px;}
    .foot-grid{grid-template-columns:1fr;}
    .cta{padding:48px 24px;}
  }
</style>
</head>
